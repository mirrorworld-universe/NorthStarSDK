name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on release branch
        run: |
          git fetch origin release
          if ! git branch -a --contains ${{ github.ref_name }} | grep -q "remotes/origin/release"; then
            echo "Tag ${{ github.ref_name }} is not on the release branch. Skipping release."
            exit 1
          fi
          echo "Tag ${{ github.ref_name }} is on release branch. Proceeding with release."

      - name: Get version from tag
        id: get_version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Found tag: $TAG, version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Update version
        run: |
          jq '.version = "${{ steps.get_version.outputs.version }}"' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build
        run: yarn build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
